name = "soccer-predictor-odds-collector"
main = "src/worker/index.ts"
compatibility_date = "2025-11-07"
compatibility_flags = ["nodejs_compat"]

# Cron triggers for automated collection
[triggers]
crons = [
  "0 6 * * *",                                 # Daily discovery at 06:00 (FREE - events endpoint)
  "5,10,15,20,25,30,35,40,45,50,55 6 * * *",   # Exec every 5 min during hour 6 (skip :00 to not overlap discovery)
  "*/5 0-5,7-23 * * *"                         # Exec every 5 min all other hours — required for T-10m precision
]

# R2 bucket binding for odds data storage
[[r2_buckets]]
binding = "ODDS_BUCKET"
bucket_name = "soccer-predictor"

[[d1_databases]]
binding = "odds_collector_db"
database_name = "odds-collector-db"
database_id = "5ad1cd7e-cfc9-4010-b272-c91c82c7f651"

# Environment variables
[vars]
TIMING_PRESET = "COMPREHENSIVE"  # MINIMAL | BASIC | STANDARD | COMPREHENSIVE
# Active leagues for odds collection
LEAGUES = '["england_premier_league","italy_serie_a", "world_cup_2026"]'
# Comma-separated regions for the-odds-api event-odds fetches. Each extra
# region multiplies credit cost by (markets × regions). eu has Pinnacle;
# uk has Betfair Exchange + major UK books.
REGIONS = "eu,uk"

# Secrets (set via: wrangler secret put <NAME>)
# - ODDS_API_KEY: The Odds API key
# - R2_ACCOUNT_ID: Cloudflare account ID for R2
# - R2_ACCESS_KEY_ID: R2 access key ID
# - R2_SECRET_ACCESS_KEY: R2 secret access key

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1